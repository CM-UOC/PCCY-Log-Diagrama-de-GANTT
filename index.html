<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANTT Diagram</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .gantt {
            position: relative;
            width: 100%;
            height: 400px;
            margin: 20px 0;
            perspective: 1000px;
        }
        .bar {
            position: absolute;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 5px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
    <h1>Project GANTT Diagram</h1>
    <div class="gantt">
        <div class="bar" style="width: 25%; top: 0; left: 0;">Phase 1: Planning</div>
        <div class="bar" style="width: 35%; top: 50px; left: 25%;">Phase 2: Design</div>
        <div class="bar" style="width: 20%; top: 100px; left: 60%;">Phase 3: Development</div>
        <div class="bar" style="width: 20%; top: 150px; left: 80%;">Phase 4: Testing</div>
    </div>
</body>
</html>
